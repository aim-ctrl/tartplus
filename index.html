<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koranen - 30 Juz Visualisering</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #0ea5e9;
        }

        /* Tvingar sidan att ta exakt hela skärmen, varken mer eller mindre */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0; 
            height: 100dvh; /* dvh = dynamic viewport height (bättre på mobil) */
            display: flex; 
            flex-direction: column;
            overflow: hidden; /* Förhindrar skrollning utanför */
        }

        /* Huvudbehållaren som fyller hela skärmen nu när rubriken är borta */
        #quran-container { 
            flex: 1; /* Tar all höjd */
            display: flex; 
            flex-direction: column; 
            padding: 10px;
            gap: 4px;
            background-color: #f1f5f9;
        }

        /* Varje Juz-rad delar lika på utrymmet på höjden */
        .juz-row {
            flex: 1; 
            display: flex; 
            width: 100%; 
            background-color: #e0e0e0;
            border-radius: 4px; 
            overflow: hidden; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Label (J1, J2) tar en fast bredd, resten blir klickbara segment */
        .juz-label {
            flex: 0 0 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #cbd5e1;
            font-size: 11px; 
            font-weight: 700; 
            color: #334155;
            border-right: 1px solid white;
        }

        .segments-container {
            flex: 1;
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Segmentens utseende */
        .surah-segment {
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: white; 
            font-weight: 600; 
            cursor: pointer;
            border-right: 1px solid rgba(255, 255, 255, 0.2); 
            transition: filter 0.2s;
            /* Auto-skalning av text */
            font-size: clamp(5px, 1.2vw, 13px);
            padding: 0 2px;
            text-align: center;
            word-wrap: break-word;
            overflow: hidden;
            line-height: 1.1;
        }
        
        .surah-segment:hover { filter: brightness(1.15); }
        .surah-segment:last-child { border-right: none; }
        
        /* POPUP (Modal) Styling */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(3px); z-index: 100;
            display: none; /* Dold från start */
            align-items: center; justify-content: center;
            padding: 20px;
        }

        .modal-card { 
            background: var(--card-bg); border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            padding: 25px; width: 100%; max-width: 350px; 
            position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute; top: 15px; right: 15px; background: none; border: none;
            font-size: 24px; color: var(--text-muted); cursor: pointer; padding: 0;
            line-height: 1; transition: color 0.2s;
        }
        .close-btn:hover { color: #ef4444; }

        .modal-card h3 { margin: 0 0 15px 0; font-size: 20px; color: var(--primary); border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; }
        .stat-row { margin-bottom: 12px; }
        .stat-label { font-weight: 600; color: var(--text-muted); display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 15px; color: var(--text-main); margin-top: 2px; font-weight: 500;}
        .tags-container { display: flex; gap: 8px; margin-top: 4px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }
        .badge-verses { background: #dbeafe; color: #1d4ed8; }
        .badge-words { background: #e0f2fe; color: #0284c7; }
    </style>
</head>
<body>

<div id="quran-container"></div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <h3 id="surah-title">Kapitel</h3>
        
        <div class="stat-row">
            <span class="stat-label">Betydelse</span>
            <div class="stat-value" id="surah-meaning">-</div>
        </div>
        
        <div class="stat-row">
            <span class="stat-label">Uppenbarelseplats</span>
            <div class="stat-value" id="surah-revelation">-</div>
        </div>

        <div class="stat-row" style="margin-top: 20px;">
            <span class="stat-label">Total storlek (Hela kapitlet)</span>
            <div class="tags-container">
                <span class="badge badge-verses" id="surah-verses">-</span>
                <span class="badge badge-words" id="surah-words">-</span>
            </div>
        </div>
    </div>
</div>

<script>
    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
    }
</script>
